services:
  app:
    build:
      dockerfile: Dockerfile
      context: . 
    ports:
      - 8000:8000
    env_file:
      - ./.env  
  worker:
    command: sh -c "rq worker --with-scheduler --url $REDIS_URL"
    build:
      dockerfile: Dockerfile
      context: . 
    ports:
      - 8000:8000
    env_file:
      - ./.env  